name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true

      - name: Build standalone binary
        run: go build -o selectellinter ./cmd/linter/

      - name: Build golangci-lint plugin
        run: CGO_ENABLED=1 go build -buildmode=plugin -o loglint.so ./cmd/plugin/

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: loglint-plugin
          path: loglint.so

  lint:
    name: Lint self
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true

      - name: Build plugin
        run: CGO_ENABLED=1 go build -buildmode=plugin -o loglint.so ./cmd/plugin/

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
        env:
          CONFIG_PATH: ./config/config.yaml